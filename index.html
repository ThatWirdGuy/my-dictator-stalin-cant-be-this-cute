<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActivityLab</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #bcbcbc; overflow: hidden; }
  #loadingScreen { position: fixed; inset: 0; background: #bcbcbc; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; z-index: 100; transition: opacity 0.25s ease; }
  #loadingScreen.hidden { opacity: 0; pointer-events: none; }
  #menuWrapper { height: 100%; display: flex; justify-content: center; align-items: center; }
  #menu { background: #e0e0e0; padding: 60px 80px; border-radius: 12px; box-shadow: 8px 8px 16px rgba(0,0,0,0.35); text-align: center; }
  .btn { background: linear-gradient(145deg, #00ff33, #00c82a); color: white; font-size: 24px; padding: 15px 34px; border: none; border-radius: 6px; cursor: pointer; margin: 10px; box-shadow: 5px 5px 10px rgba(0,0,0,0.45); }
  .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
  #iframeContainer { position: fixed; inset: 0; display: none; background: #000; z-index: 50; }
  #iframeContainer iframe { width: 100%; height: 100%; border: none; }
  #backBtn { position: absolute; top: 10px; left: 10px; z-index: 60; padding: 5px 10px; cursor: pointer; opacity: 0.3; }
  #backBtn:hover { opacity: 1; }
</style>
</head>
<body>

<div id="loadingScreen">Loading...</div>

<div id="menuWrapper">
  <div id="menu">
    <h1>ActivityLab</h1>
    <button class="btn" onclick="launchGame(false)">Play On Site</button>
    <button class="btn" onclick="launchGame(true)">Fullscreen</button>
  </div>
</div>

<div id="iframeContainer">
  <button id="backBtn" onclick="location.reload()">← Back to Menu</button>
  <iframe id="siteFrame" allow="cross-origin-isolated; autoplay; fullscreen"></iframe>
</div>

<script>
const SITE_URL = "game.html"; // Ensure this matches your game's HTML filename

window.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => { document.getElementById("loadingScreen").classList.add("hidden"); }, 120);
});

function launchGame(goFullscreen) {
  const container = document.getElementById("iframeContainer");
  const frame = document.getElementById("siteFrame");

  document.getElementById("menuWrapper").style.display = "none";
  container.style.display = "block";
  
  // Set source
  frame.src = SITE_URL;

  if (goFullscreen) {
    if (container.requestFullscreen) { container.requestFullscreen(); }
    else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
  }
}
</script>
</body>
</html>
