<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>My Dictator Stalin Can't Be This Cute</title>
    <style>
        html, body, #canvas { margin: 0; padding: 0; border: 0; width: 100%; height: 100%; }
        body { color: white; background-color: black; overflow: hidden; touch-action: none; display: flex; }
        #canvas { display: block; }
        #canvas:focus { outline: none; }
        #status, #status-splash, #status-progress { position: absolute; left: 0; right: 0; }
        #status, #status-splash { top: 0; bottom: 0; }
        #status { background-color: #242424; display: flex; flex-direction: column; justify-content: center; align-items: center; visibility: hidden; z-index: 10; }
        #status-splash { max-height: 100%; max-width: 100%; margin: auto; }
        #status-progress, #status-notice { display: none; }
        #status-progress { bottom: 10%; width: 50%; margin: 0 auto; }
        #status-notice { background-color: #5b3943; border-radius: 0.5rem; border: 1px solid #9b3943; color: #e0e0e0; font-family: Arial, sans-serif; line-height: 1.3; margin: 0 2rem; padding: 1rem; text-align: center; z-index: 1; }
    </style>
</head>
<body>
    <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
    <div id="status">
        <img id="status-splash" src="index.png" alt="">
        <progress id="status-progress"></progress>
        <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
        const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{},"focusCanvas":true,"gdextensionLibs":[],"serviceWorker":"index.service.worker.js"};
        const engine = new Engine(GODOT_CONFIG);

        (function () {
            const statusOverlay = document.getElementById('status');
            const statusProgress = document.getElementById('status-progress');
            const statusNotice = document.getElementById('status-notice');
            let initializing = true;

            function setStatusMode(mode) {
                if (!initializing) return;
                if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
                statusOverlay.style.visibility = 'visible';
                statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
            }

            function displayFailureNotice(err) {
                statusNotice.innerText = err instanceof Error ? err.message : String(err);
                setStatusMode('notice');
                initializing = false;
            }

            // Register Service Worker to handle Cross-Origin Isolation
            if (!window.crossOriginIsolated && 'serviceWorker' in navigator) {
                navigator.serviceWorker.register(GODOT_CONFIG.serviceWorker).then(() => {
                    if (!sessionStorage.getItem('sw_fixed')) {
                        sessionStorage.setItem('sw_fixed', 'true');
                        window.location.reload();
                    } else {
                        startEngine();
                    }
                }).catch(displayFailureNotice);
            } else {
                startEngine();
            }

            function startEngine() {
                const missing = Engine.getMissingFeatures({ threads: true });
                if (missing.length !== 0) {
                    displayFailureNotice("Missing features: " + missing.join(", "));
                    return;
                }

                setStatusMode('progress');
                engine.startGame({
                    onProgress: (current, total) => {
                        if (total > 0) {
                            statusProgress.value = current;
                            statusProgress.max = total;
                        }
                    }
                }).then(() => {
                    setStatusMode('hidden');
                    // Timeout ensures the game renders its first frame before the alert stops the script
                    setTimeout(() => { 
                        alert("Game Loaded!"); 
                    }, 150);
                }, displayFailureNotice);
            }
        }());
    </script>
</body>
</html>
